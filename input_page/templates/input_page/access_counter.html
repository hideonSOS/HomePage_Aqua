{% extends 'input_page/staff_template.html' %}
{% load static %}

{% block extra_css %}
<style>
  .total-count {
    text-align: center;
    margin-bottom: 40px;
  }
  .total-count h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
    color: #1a237e;
  }
  .count-number {
    font-size: 4rem;
    font-weight: bold;
    color: #2196F3;
  }
  h2 {
    font-size: 1.1rem;
    margin-bottom: 12px;
    color: #555;
  }
  .page-table {
    width: 100%;
    border-collapse: collapse;
  }
  .page-table th,
  .page-table td {
    border: 1px solid #ddd;
    padding: 10px 14px;
    text-align: left;
  }
  .page-table th {
    background-color: #e8eaf6;
    font-weight: bold;
    color: #1a237e;
  }
  .page-table tr:nth-child(even) {
    background-color: #fafafa;
  }

  /* タブレット (〜 768px) */
  @media (max-width: 768px) {
    .total-count h1 { font-size: 1.5rem; }
    .count-number { font-size: 3rem; }
    .total-count { margin-bottom: 28px; }
    .page-table th,
    .page-table td { padding: 8px 10px; font-size: 0.92rem; }
  }

  /* スマホ (〜 480px) */
  @media (max-width: 480px) {
    .total-count h1 { font-size: 1.2rem; }
    .count-number { font-size: 2.4rem; }
    .total-count { margin-bottom: 20px; }
    h2 { font-size: 1rem; }
    .page-table th,
    .page-table td { padding: 8px; font-size: 0.88rem; }
  }
</style>
{% endblock %}

{% block content %}
  <div class="total-count">
    <h1>総アクセス数</h1>
    <div class="count-number">{{ total }}</div>
  </div>

  <h2>カテゴリ別アクセス数</h2>
  <table class="page-table">
    <thead>
      <tr>
        <th>カテゴリ</th>
        <th>アクセス数</th>
      </tr>
    </thead>
    <tbody>
      {% for item in by_page %}
      <tr>
        <td>{{ item.page }}</td>
        <td>{{ item.count }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2">データがありません</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
