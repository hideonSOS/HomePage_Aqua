{% extends 'template.html' %}
{% load static %}
{% block extra_css %}
<link rel='stylesheet' href="{% static 'artist/css/artist.css' %}?v={% now 'U' %}">
{% endblock %}
{% block content %}

<main id="main">
  <header class="artist-head">
    <h1 class="artist-title">出演者イラスト</h1>
    <p class="artist-lead">アクアライブステーションでおなじみの出演者たちをイラストでご紹介します。</p>
  </header>

  <section class="artist-grid" aria-label="出演者イラスト一覧">

    <figure class="artist-card">
      <img src="{% static 'artist/gazou/tateyama.gif' %}" alt="出演者イラスト" loading="lazy" />
    </figure>

    <figure class="artist-card">
      <img src="{% static 'artist/gazou/tuda.gif' %}" alt="出演者イラスト" loading="lazy" />
    </figure>

    <figure class="artist-card">
      <img src="{% static 'artist/gazou/okiguchi.gif' %}" alt="出演者イラスト" loading="lazy" />
    </figure>

    <figure class="artist-card">
      <img src="{% static 'artist/gazou/iida.gif' %}" alt="出演者イラスト" loading="lazy" />
    </figure>

    <figure class="artist-card">
      <img src="{% static 'artist/gazou/nozoe.gif' %}" alt="出演者イラスト" loading="lazy" />
    </figure>

  </section>
</main>
{% endblock %}
